name: Update lazy-lock.json

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  update-lazy-lock:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git gh

      - name: Symlink Neovim config
        run: |
          mkdir -p ~/.config
          ln -sf $GITHUB_WORKSPACE ~/.config/nvim

      - name: Update lazy-lock.json
        run: |
          nvim --headless "+Lazy! sync" +qa

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet lazy-lock.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: List files for debugging
        if: steps.changes.outputs.changed == 'true'
        run: |
          ls -l

      - name: Create PR if changes
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b update/lazy-lock
          [ -f lazy-lock.json ] && git add lazy-lock.json
          git commit -m "chore: update lazy-lock.json"
          git push origin -f update/lazy-lock
          gh pr create --title "chore: update lazy-lock.json" \
                       --body "Automated update of lazy-lock.json" \
                       --base main \
                       --head update/lazy-lock \
                       --assignee f-koehler \
                       --reviewer f-koehler
