name: Test Neovim Configuration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-config:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        neovim-version: ["stable", "nightly"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            curl \
            build-essential \
            nodejs \
            npm \
            ripgrep \
            fd-find \
            unzip

      - name: Install Rust and Cargo
        uses: dtolnay/rust-toolchain@stable

      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.neovim-version }}

      - name: Install formatters and language servers
        run: |
          # Install stylua for Lua formatting
          cargo install stylua

          # Install prettier for JS/TS/JSON/CSS formatting
          npm install -g prettier

          # Install additional formatters
          npm install -g @taplo/cli  # for TOML formatting
          pip install ruff           # for Python formatting

          # Install language servers
          npm install -g lua-language-server

      - name: Create test directory
        run: |
          mkdir -p ~/.config
          ln -sf $GITHUB_WORKSPACE ~/.config/nvim

      - name: Test Neovim startup
        run: |
          # Test basic startup and immediate exit
          timeout 30s nvim --headless -c "quitall" || echo "Basic startup test completed"

      - name: Install plugins
        run: |
          # Install plugins in headless mode
          timeout 120s nvim --headless -c "Lazy! sync" -c "quitall" || echo "Plugin installation completed"

      - name: Run checkhealth
        run: |
          # Run checkhealth and capture output
          nvim --headless -c "checkhealth" -c "write! /tmp/checkhealth.log" -c "quitall" || true

          # Display checkhealth results
          echo "=== Neovim Health Check Results ==="
          cat /tmp/checkhealth.log || echo "No checkhealth output available"

      - name: Test LSP functionality
        run: |
          # Create a simple Lua file for LSP testing
          cat > /tmp/test.lua << 'EOF'
          -- Simple Lua file for LSP testing
          local function hello(name)
            print("Hello, " .. name)
          end

          hello("World")
          EOF

          # Test LSP can start and analyze the file
          timeout 30s nvim --headless /tmp/test.lua -c "lua vim.lsp.start({name='lua_ls', cmd={'lua-language-server'}})" -c "sleep 2" -c "quitall" || echo "LSP test completed"

      - name: Test configuration loading
        run: |
          # Test that configuration files can be loaded without errors
          nvim --headless -c "lua require('config.lazy')" -c "quitall"
          nvim --headless -c "lua require('config.lsp')" -c "quitall"
          echo "Configuration loading test completed"

      - name: Upload checkhealth results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkhealth-results-${{ matrix.neovim-version }}
          path: /tmp/checkhealth.log
          retention-days: 7

  test-nix-shell:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v23
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Test Nix shell environment
        run: |
          # Test that the Nix shell can be built and contains expected tools
          nix-shell --run "echo 'Testing Nix shell environment...'"
          nix-shell --run "which stylua && stylua --version"
          nix-shell --run "which lua-language-server && lua-language-server --version"
          nix-shell --run "which fd && fd --version"
          nix-shell --run "which rg && rg --version"
          nix-shell --run "which cargo && cargo --version"
          nix-shell --run "which node && node --version"
          echo "Nix shell environment test completed successfully"

      - name: Test Neovim in Nix shell
        run: |
          # Install Neovim in Nix shell and test basic functionality
          nix-shell --run "
            mkdir -p ~/.config
            ln -sf $PWD ~/.config/nvim
            timeout 30s nvim --headless -c 'quitall' || echo 'Neovim test in Nix shell completed'
          "
